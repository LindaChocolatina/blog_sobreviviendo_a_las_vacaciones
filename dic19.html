<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    <header class="franja-titulo">
    <h1 class="titulo-entrada">
        La primera tamalada
    </h1>

    <main class="entrada">

    <img class="imagen-principal" src="img/dic19.jpeg" alt="La primera tamalada en un cuenco">

           </div>
</main>
<section class="comentarios">

    <h3>Deja tu comentario</h3>

    <form id="form-comentarios" class="form-comentarios">
        <input type="text" id="nombre" placeholder="Tu nombre" required>
        <textarea id="comentario" placeholder="Escribe tu comentario..." required></textarea>
        <button type="submit">Enviar</button>
    </form>

    <div id="lista-comentarios"></div>

</section>

 <footer class="franja-volver">
    <a href="index.html">← Volver al calendario</a>
</footer>

<script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 
  
  const firebaseConfig = {
  apiKey: "AIzaSyBErDAQ7fJx_DlcwL2NSSe-n1DpbuDkT_w",
  authDomain: "sobreviviendo-a-las-vacaciones.firebaseapp.com",
  projectId: "sobreviviendo-a-las-vacaciones",
  storageBucket: "sobreviviendo-a-las-vacaciones.firebasestorage.app",
  messagingSenderId: "609045590762",
  appId: "1:609045590762:web:8581a0e872e9285afd5d93",
  measurementId: "G-RYS6YX8E34"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const postId = "dic19-la-primera-tamalada"; 

  const form = document.getElementById("form-comentarios");
  const lista = document.getElementById("lista-comentarios");

  async function cargarComentarios() {
    const q = query(collection(db, "posts", postId, "comentarios"), orderBy("fecha", "desc"));
    const querySnapshot = await getDocs(q);
    
    lista.innerHTML = ""; 

    if (querySnapshot.empty) { 
        const noCommentsDiv = document.createElement("div");
        noCommentsDiv.textContent = "Aún no hay comentarios. ¡Sé el primero en comentar!";
        lista.appendChild(noCommentsDiv);
    } else {
        querySnapshot.forEach((doc) => {
            const datos = doc.data();
            const div = document.createElement("div");
            div.classList.add("comentario");
            div.innerHTML = `
                <strong>${datos.usuario}</strong>
                <p>${datos.texto}</p>
                <small>${datos.fecha ? datos.fecha.toDate().toLocaleString() : ""}</small>
                <hr>
            `;
            lista.appendChild(div);
        });
    }
  }

  cargarComentarios();

  if (form) { 
      form.addEventListener("submit", async (e) => {
        e.preventDefault(); 

        const nombreInput = document.getElementById("nombre").value;
        const comentarioInput = document.getElementById("comentario").value;

        try {
          await addDoc(collection(db, "posts", postId, "comentarios"), {
            usuario: nombreInput,
            texto: comentarioInput,
            fecha: serverTimestamp() 
          });

          form.reset(); 
          alert("¡Comentario publicado con éxito!");
          cargarComentarios(); 
        } catch (error) {
          console.error("Error al enviar:", error);
          alert("Hubo un error al guardar tu comentario.");
        }
      });
  }
</script>

</body>
</html>
